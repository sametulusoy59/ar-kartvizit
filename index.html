<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>J.A.R.V.I.S. UI - Cagri Samet ULUSOY</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // Geliştirilmiş, mobilde kesin çalışan link komponenti
      AFRAME.registerComponent('hologram-link', {
        schema: { url: { type: 'string' } },
        init: function () {
          this.el.addEventListener('click', () => {
            // Mobilde pop-up block yememek için doğrudan sekmeyi aç
            window.location.href = this.data.url;
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false">
        <a-entity cursor="rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-entity position="0 0.1 0.1">
          <a-circle src="profil.jpeg" radius="0.4" 
                    material="opacity: 0.7; transparent: true; blending: additive; side: double"
                    animation="property: position; to: 0 0.05 0.1; dir: alternate; dur: 2000; loop: true">
            <a-plane width="0.8" height="0.01" color="#00f3ff" position="0 0 0.01"
                     animation="property: position; from: 0 0.4 0.01; to: 0 -0.4 0.01; dur: 2500; loop: true; easing: linear"></a-plane>
          </a-circle>
          <a-ring radius-inner="0.45" radius-outer="0.48" color="#00f3ff" opacity="0.4" rotation="90 0 0"
                  animation="property: rotation; to: 90 360 0; loop: true; dur: 8000; easing: linear"></a-ring>
          <a-ring radius-inner="0.5" radius-outer="0.53" color="#ffaa00" opacity="0.2" rotation="90 0 0"
                  animation="property: rotation; to: 90 -360 0; loop: true; dur: 12000; easing: linear"></a-ring>
        </a-entity>

        <a-entity position="-0.4 0.7 0.2">
            <a-text value="CAGRI SAMET ULUSOY" color="#00f3ff" width="3.5" font="exo2bold"></a-text>
            <a-text value="COMPUTER SYSTEMS ENGINEER" position="0 -0.12 0" color="#ffffff" width="1.8"></a-text>
            <a-plane width="1.5" height="0.01" color="#ff0000" position="0.3 -0.15 0"></a-plane>
        </a-entity>

        <a-entity position="-1 0.3 0.3" rotation="0 15 0" scale="0.7 0.7 0.7">
            <a-plane width="1.4" height="0.6" color="#001a33" material="opacity: 0.8; transparent: true"></a-plane>
            <a-plane width="1.4" height="0.6" material="wireframe: true; color: #00f3ff; opacity: 0.4"></a-plane>
            <a-text value="EGITIM & YAYINLAR" position="-0.65 0.22 0.02" width="2" color="#00f3ff" font="exo2bold"></a-text>
            
            <a-entity class="clickable" position="0 0 0.03" hologram-link="url: https://tez.yok.gov.tr/UlusalTezMerkezi/tezSorguSonucYeni.jsp">
                <a-plane width="1.3" height="0.2" color="#004080" opacity="0.6"></a-plane>
                <a-text value="> YL Tezi (Unity/Vuforia)" position="-0.6 0 0.01" width="1.5"></a-text>
            </a-entity>
        </a-entity>

        <a-entity position="1 0.3 0.3" rotation="0 -15 0" scale="0.7 0.7 0.7">
            <a-plane width="1.4" height="0.6" color="#001a33" material="opacity: 0.8; transparent: true"></a-plane>
            <a-plane width="1.4" height="0.6" material="wireframe: true; color: #ff3300; opacity: 0.4"></a-plane>
            <a-text value="EXPERIENCE" position="-0.65 0.22 0.02" width="2" color="#ff3300" font="exo2bold"></a-text>
            
            <a-plane width="0.01" height="0.4" color="#ffaa00" position="-0.6 0 0.01"></a-plane>
            <a-sphere radius="0.02" color="#ffaa00" position="-0.6 0.15 0.02"></a-sphere>
            <a-sphere radius="0.02" color="#ffaa00" position="-0.6 0 0.02"></a-sphere>
            <a-sphere radius="0.02" color="#ffaa00" position="-0.6 -0.15 0.02"></a-sphere>
            
            <a-text value="2024: Ministry of Industry\n2023: Cerkezkoy OIZ Director.\n2022: Turuncu Mavi Agency" position="-0.55 -0.05 0.01" width="1.3" line-height="55"></a-text>
        </a-entity>

        <a-entity position="-1 -0.4 0.3" rotation="0 15 0" scale="0.7 0.7 0.7">
            <a-plane width="1.4" height="0.5" color="#001a33" opacity="0.8"></a-plane>
            <a-text value="TEKNOLOJI YIGINI" position="-0.65 0.18 0.02" width="2" color="#00f3ff" font="exo2bold"></a-text>
            
            <a-entity position="-0.3 0 0.01" rotation="45 0 0">
                <a-plane width="0.2" height="0.2" color="#ffaa00" opacity="0.7"></a-plane>
                <a-cylinder radius="0.01" height="0.2" color="#ffffff" position="0 0.11 0"></a-cylinder>
                <a-cylinder radius="0.01" height="0.2" color="#ffffff" position="0 -0.11 0"></a-cylinder>
                <a-cylinder radius="0.01" height="0.2" color="#ffffff" position="0.11 0 0" rotation="0 0 90"></a-cylinder>
                <a-cylinder radius="0.01" height="0.2" color="#ffffff" position="-0.11 0 0" rotation="0 0 90"></a-cylinder>
            </a-entity>
            <a-text value="Unity | Vuforia | WebAR" position="0 -0.05 0.02" width="1.5" color="#ffffff"></a-text>
        </a-entity>

        <a-entity position="1 -0.4 0.3" rotation="0 -15 0" scale="0.7 0.7 0.7">
            <a-plane width="1.4" height="0.5" color="#001a33" opacity="0.8"></a-plane>
            <a-text value="SOSYAL MEDYA" position="-0.65 0.18 0.02" width="2" color="#00f3ff"></a-text>
            
            <a-entity class="clickable" position="-0.35 -0.05 0.02" hologram-link="url: https://www.instagram.com/sametulusoy59">
                <a-plane width="0.6" height="0.2" color="#E1306C">
                    <a-image src="li.png" width="0.1" height="0.1" position="-0.22 0 0.01"></a-image>
                    <a-text value="INSTAGRAM" position="0 0 0.02" align="center" width="1.5" color="#ffffff" font="exo2bold"></a-text>
                </a-plane>
            </a-entity>

            <a-entity class="clickable" position="0.35 -0.05 0.02" hologram-link="url: https://tr.linkedin.com/in/csametulusoy">
                <a-plane width="0.6" height="0.2" color="#0077b5">
                    <a-image src="ig.png" width="0.1" height="0.1" position="-0.22 0 0.01"></a-image>
                    <a-text value="LINKEDIN" position="0 0 0.02" align="center" width="1.5" color="#ffffff" font="exo2bold"></a-text>
                </a-plane>
            </a-entity>
        </a-entity>

        <a-ring radius-inner="1.5" radius-outer="1.52" color="#ffaa00" opacity="0.1" position="0 0 -0.1" rotation="90 0 0"></a-ring>

      </a-entity>
    </a-scene>
  </body>
</html>
