<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>AR Holografik CV - Çağrı Samet ULUSOY</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      AFRAME.registerComponent('open-link', {
        schema: { url: { type: 'string' } },
        init: function () {
          this.el.addEventListener('click', () => {
            // Mobilde pop-up block yememek için doğrudan yönlendirme
            window.location.href = this.data.url;
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false">
        <a-entity cursor="rayOrigin: mouse; fuse: false" raycaster="objects: .clickable"></a-entity>
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-ring radius-inner="0.6" radius-outer="0.62" color="#00f3ff" material="opacity: 0.5; transparent: true" animation="property: rotation; to: 0 0 360; loop: true; dur: 8000; easing: linear"></a-ring>
        <a-ring radius-inner="0.65" radius-outer="0.68" color="#00f3ff" material="opacity: 0.2; transparent: true" animation="property: rotation; to: 0 0 -360; loop: true; dur: 12000; easing: linear"></a-ring>

        <a-entity position="0 0.8 0.1" animation="property: position; to: 0 0.82 0.1; dir: alternate; dur: 2000; loop: true">
          <a-plane width="1.4" height="0.3" color="#001a33" material="opacity: 0.8; transparent: true"></a-plane>
          <a-plane width="1.4" height="0.3" color="#00f3ff" material="wireframe: true; opacity: 0.4"></a-plane>
          
          <a-text value="CAGRI SAMET ULUSOY" position="0 0.05 0.02" align="center" width="2.8" color="#ffffff" font="exo2bold"></a-text>
          <a-text value="Bilgisayar Yuksek Muhendisi" position="0 -0.08 0.02" align="center" width="1.5" color="#00f3ff"></a-text>
        </a-entity>

        <a-entity position="-0.85 0 0.2" rotation="0 20 0" animation="property: position; to: -0.85 0.02 0.2; dir: alternate; dur: 2300; loop: true">
          <a-plane width="1.2" height="0.65" color="#001a33" material="opacity: 0.8; transparent: true"></a-plane>
          <a-plane width="1.2" height="0.65" color="#00f3ff" material="wireframe: true; opacity: 0.3"></a-plane>
          
          <a-text value="EGITIM & YAYINLAR" position="0 0.22 0.02" align="center" width="1.8" color="#ffffff" font="exo2bold"></a-text>
          
          <a-entity class="clickable" position="0 0.02 0.02" open-link="url: https://tez.yok.gov.tr/UlusalTezMerkezi/tezSorguSonucYeni.jsp">
            <a-plane width="1.1" height="0.18" color="#004080" material="opacity: 0.6"></a-plane>
            <a-text value="> YL Tezi: AR ve Vuforia" position="-0.5 0 0.01" width="1.4" color="#00f3ff"></a-text>
          </a-entity>

          <a-entity class="clickable" position="0 -0.2 0.02" open-link="url: https://agbiol.congress.gen.tr/files/site/16/files/AGBIOL%202022%20FULL%20PROCEEDINGS%20BOOK.pdf#page1029">
            <a-plane width="1.1" height="0.18" color="#004080" material="opacity: 0.6"></a-plane>
            <a-text value="> Bildiri: UNITY vs VUFORIA" position="-0.5 0 0.01" width="1.4" color="#00f3ff"></a-text>
          </a-entity>
        </a-entity>

        <a-entity position="0.85 0 0.2" rotation="0 -20 0" animation="property: position; to: 0.85 0.02 0.2; dir: alternate; dur: 2100; loop: true">
          <a-plane width="1.2" height="0.65" color="#001a33" material="opacity: 0.8; transparent: true"></a-plane>
          <a-plane width="1.2" height="0.65" color="#ffaa00" material="wireframe: true; opacity: 0.3"></a-plane>
          
          <a-text value="IS DENEYIMI" position="0 0.22 0.02" align="center" width="1.8" color="#ffffff" font="exo2bold"></a-text>
          
          <a-text value="> Ministry of Industry and\n  Technology (2024-Halen)\n\n> Cerkezkoy OSB Mudurlugu\n\n> Turuncu Mavi Web Ajansi" position="-0.5 -0.05 0.02" width="1.3" color="#ffcc00" line-height="55"></a-text>
        </a-entity>

        <a-entity position="0 -0.8 0.1" animation="property: position; to: 0 -0.82 0.1; dir: alternate; dur: 1800; loop: true">
          
          <a-entity class="clickable" position="-0.35 0 0" open-link="url: https://www.instagram.com/sametulusoy59">
            <a-plane width="0.6" height="0.2" color="#E1306C" material="opacity: 0.9"></a-plane>
            <a-plane width="0.6" height="0.2" color="#ffffff" material="wireframe: true; opacity: 0.5"></a-plane>
            <a-text value="INSTAGRAM" position="0 0 0.02" align="center" width="1.5" color="#ffffff" font="exo2bold"></a-text>
          </a-entity>

          <a-entity class="clickable" position="0.35 0 0" open-link="url: https://tr.linkedin.com/in/csametulusoy">
            <a-plane width="0.6" height="0.2" color="#0077b5" material="opacity: 0.9"></a-plane>
            <a-plane width="0.6" height="0.2" color="#ffffff" material="wireframe: true; opacity: 0.5"></a-plane>
            <a-text value="LINKEDIN" position="0 0 0.02" align="center" width="1.5" color="#ffffff" font="exo2bold"></a-text>
          </a-entity>

        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
