<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta charset="utf-8" />

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <!-- Particle sistemi -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-particle-system-component@1.1.3/dist/aframe-particle-system-component.min.js"></script>

  <script>
    AFRAME.registerComponent('hologram-link', {
      schema: { url: { type: 'string' } },
      init: function () {
        this.el.addEventListener('click', () => {
          window.location.href = this.data.url;
        });
      }
    });
  </script>

</head>

<body>

<a-scene mindar-image="imageTargetSrc: targets.mind;"
         color-space="sRGB"
         renderer="colorManagement: true"
         vr-mode-ui="enabled: false"
         device-orientation-permission-ui="enabled: false">

  <a-camera position="0 0 0" look-controls="enabled: false">
    <a-entity cursor="rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>
  </a-camera>

  <a-entity mindar-image-target="targetIndex: 0">

    <!-- 🔥 HOLOGRAM CORE -->
    <a-entity position="0 0.1 0">

      <!-- IŞIK BEAM -->
      <a-cylinder radius="0.15" height="1"
                  color="#00f3ff"
                  opacity="0.1"
                  position="0 -0.2 0"
                  animation="property: scale; to: 1 1.2 1; dir: alternate; loop: true; dur: 2000">
      </a-cylinder>

      <!-- PARTICLE AURA -->
      <a-entity particle-system="
          preset: dust;
          color: #00f3ff,#ffffff;
          size: 1;
          particleCount: 300;
          velocityValue: 0 0.1 0;
          opacity: 0.6">
      </a-entity>

      <!-- ALT HALKA -->
      <a-ring radius-inner="0.4" radius-outer="0.45"
              color="#00f3ff"
              rotation="90 0 0"
              animation="property: rotation; to: 90 360 0; loop: true; dur: 3000">
      </a-ring>

      <!-- ÜST HALKA -->
      <a-ring radius-inner="0.25" radius-outer="0.27"
              color="#ffffff"
              position="0 0.3 0"
              rotation="90 0 0"
              opacity="0.5"
              animation="property: rotation; to: 90 -360 0; loop: true; dur: 2000">
      </a-ring>

      <!-- GLOW -->
      <a-circle src="profil.jpeg"
                radius="0.4"
                material="opacity:0.15; blending:additive; transparent:true">
      </a-circle>

      <!-- ANA HOLOGRAM -->
      <a-circle src="profil.jpeg"
                radius="0.32"
                material="opacity:0.85; blending:additive; transparent:true"

                animation__float="property: position; to: 0 0.15 0; dir: alternate; dur: 2000; loop: true"
                animation__scale="property: scale; to: 1.05 1.05 1; dir: alternate; dur: 2000; loop: true"
                animation__flicker="property: material.opacity; from:0.6; to:0.9; dir:alternate; dur:200; loop:true">

        <!-- SCAN -->
        <a-plane width="0.7" height="0.01"
                 color="#00f3ff"
                 position="0 0 0.01"
                 animation="property: position; from:0 0.35 0.01; to:0 -0.35 0.01; dur:1500; loop:true">
        </a-plane>

      </a-circle>

    </a-entity>

    <!-- 🔥 BAŞLIK -->
    <a-text value="ARTIRILMIS GERCEKLIK CV"
            position="0 0.9 0"
            align="center"
            width="3"
            color="#ffffff"
            animation="property: opacity; from:0.5; to:1; dir:alternate; loop:true; dur:1500">
    </a-text>

    <!-- 🔥 SOL PANEL -->
    <a-entity position="-1 0.3 0.3" rotation="0 15 0" scale="0.5 0.5 0.5">

      <a-plane width="1.8" height="0.7"
               material="color:#001a33; opacity:0.5"></a-plane>

      <a-plane width="1.8" height="0.7"
               material="wireframe:true; color:#00f3ff; opacity:0.4"></a-plane>

      <a-text value="EGITIM"
              position="-0.8 0.25 0.02"
              color="#00f3ff"></a-text>

      <a-text value="Unity + Vuforia AR"
              position="-0.8 0 0.02"
              width="1.8"></a-text>

    </a-entity>

    <!-- 🔥 SAĞ PANEL -->
    <a-entity position="1 0.3 0.3" rotation="0 -15 0" scale="0.5 0.5 0.5">

      <a-plane width="1.8" height="0.7"
               material="color:#001a33; opacity:0.5"></a-plane>

      <a-plane width="1.8" height="0.7"
               material="wireframe:true; color:#ff3300; opacity:0.4"></a-plane>

      <a-text value="DENEYIM"
              position="-0.8 0.25 0.02"
              color="#ff3300"></a-text>

      <a-text value="Ministry / OSB / Agency"
              position="-0.8 -0.1 0.02"
              width="1.8"></a-text>

    </a-entity>

    <!-- 🔥 ALT PARTİCLE FOG -->
    <a-entity particle-system="
      preset: dust;
      particleCount: 200;
      color: #00f3ff,#ff3300;
      size: 1;
      velocityValue: 0 0.05 0;
      opacity: 0.3">
    </a-entity>

  </a-entity>

</a-scene>

</body>
</html>
