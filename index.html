<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>J.A.R.V.I.S. AR - Çağrı Samet ULUSOY</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // Mobilde linklerin kesin açılması için geliştirilmiş sistem
      AFRAME.registerComponent('hologram-link', {
        schema: { url: { type: 'string' } },
        init: function () {
          this.el.addEventListener('click', () => {
            window.location.href = this.data.url;
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false">
        <a-entity cursor="rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-entity position="0 0 0.1">
          <a-circle src="profil.jpeg" radius="0.35" 
                    material="opacity: 0.8; transparent: true; blending: additive; side: double"
                    animation="property: position; to: 0 0.05 0.1; dir: alternate; dur: 2000; loop: true">
            <a-plane width="0.7" height="0.01" color="#00f3ff" position="0 0 0.01"
                     animation="property: position; from: 0 0.35 0.01; to: 0 -0.35 0.01; dur: 2500; loop: true; easing: linear"></a-plane>
          </a-circle>

          <a-ring radius-inner="0.4" radius-outer="0.42" color="#00f3ff" rotation="90 0 0"
                  animation="property: rotation; to: 90 360 0; loop: true; dur: 5000; easing: linear"></a-ring>
          <a-ring radius-inner="0.44" radius-outer="0.45" color="#ff3300" rotation="90 0 0" opacity="0.5"
                  animation="property: rotation; to: 90 -360 0; loop: true; dur: 8000; easing: linear"></a-ring>
          <a-ring radius-inner="0.48" radius-outer="0.5" color="#00f3ff" rotation="45 45 0" opacity="0.2"
                  animation="property: rotation; to: 405 405 0; loop: true; dur: 15000; easing: linear"></a-ring>
        </a-entity>

        <a-entity position="-0.9 0.5 0.2" rotation="0 20 0" scale="0.5 0.5 0.5">
          <a-plane width="1.8" height="0.7" color="#001a33" opacity="0.7" material="transparent: true"></a-plane>
          <a-text value="EGITIM & ARASTIRMA" position="-0.8 0.25 0.02" width="2.5" color="#00f3ff"></a-text>
          
          <a-entity class="clickable" position="0 0.05 0.03" hologram-link="url: https://tez.yok.gov.tr/UlusalTezMerkezi/tezSorguSonucYeni.jsp">
            <a-text value="> Yuksek Lisans Tezi:\nUnity ve Vuforia kullanarak bir\nartirilmis gerceklik uygulamasi" position="-0.8 0 0" width="1.8" color="#ffffff"></a-text>
          </a-entity>
          
          <a-entity class="clickable" position="0 -0.2 0.03" hologram-link="url: https://agbiol.congress.gen.tr/files/site/16/files/AGBIOL%202022%20FULL%20PROCEEDINGS%20BOOK.pdf#page1029">
            <a-text value="> Uluslararasi Hakemli Bildiri:\nCOMPARISON OF TWO APPS BUILT\nWITH UNITY AND VUFORIA" position="-0.8 0 0" width="1.8" color="#ffffff"></a-text>
          </a-entity>
        </a-entity>

        <a-entity position="0.9 0.5 0.2" rotation="0 -20 0" scale="0.5 0.5 0.5">
          <a-plane width="1.8" height="0.7" color="#001a33" opacity="0.7"></a-plane>
          <a-text value="DENEYIM" position="-0.8 0.25 0.02" width="2.5" color="#ff3300"></a-text>
          
          <a-plane width="0.01" height="0.4" color="#ff3300" position="-0.7 -0.05 0.01"></a-plane>
          <a-sphere radius="0.03" color="#ff3300" position="-0.7 0.15 0.02"></a-sphere>
          <a-sphere radius="0.03" color="#ff3300" position="-0.7 -0.05 0.02"></a-sphere>
          <a-sphere radius="0.03" color="#ff3300" position="-0.7 -0.25 0.02"></a-sphere>
          
          <a-text value="2024: Ministry of Industry\n2023: Cerkezkoy OIZ Director.\n2022: Turuncu Mavi Agency" position="-0.6 -0.05 0.02" width="1.8" line-height="55"></a-text>
        </a-entity>

        <a-entity position="-0.9 -0.5 0.2" rotation="0 20 0" scale="0.5 0.5 0.5">
          <a-plane width="1.8" height="0.6" color="#001a33" opacity="0.7"></a-plane>
          <a-text value="TEKNOLOJI YIGINI" position="-0.8 0.2 0.02" width="2.5" color="#00f3ff"></a-text>
          
          <a-box color="#00f3ff" size="0.1" position="-0.5 -0.1 0.1" animation="property: rotation; to: 360 360 0; loop: true; dur: 3000">
            <a-text value="Unity" position="0.1 0 0" width="2"></a-text>
          </a-box>
          <a-sphere color="#ffaa00" radius="0.05" position="0.2 -0.1 0.1" animation="property: position; to: 0.2 0 0.1; dir: alternate; loop: true; dur: 2000">
            <a-text value="Vuforia" position="0.1 0 0" width="2"></a-text>
          </a-sphere>
          <a-text value="WebAR | C# .NET | ARCore" position="-0.4 -0.3 0.02" width="1.8" color="#ffffff"></a-text>
        </a-entity>

        <a-entity position="0.9 -0.5 0.2" rotation="0 -20 0" scale="0.5 0.5 0.5">
          <a-plane width="1.8" height="0.6" color="#001a33" opacity="0.7"></a-plane>
          <a-text value="ILETISIM" position="-0.8 0.2 0.02" width="2.5" color="#00f3ff"></a-text>
          
          <a-entity class="clickable" position="0 0 0.03" hologram-link="url: https://www.instagram.com/sametulusoy59">
            <a-plane width="1.6" height="0.15" color="#E1306C" opacity="0.9">
                <a-text value="INSTAGRAM: /sametulusoy59" align="center" width="2"></a-text>
            </a-plane>
          </a-entity>

          <a-entity class="clickable" position="0 -0.25 0.03" hologram-link="url: https://tr.linkedin.com/in/csametulusoy">
            <a-plane width="1.6" height="0.15" color="#0077b5" opacity="0.9">
                <a-text value="LINKEDIN: /in/csametulusoy" align="center" width="2"></a-text>
            </a-plane>
          </a-entity>
        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
