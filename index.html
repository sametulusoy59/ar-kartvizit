<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>J.A.R.V.I.S. AR UI - Çağrı Samet ULUSOY</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      // Mobilde linklerin ve etkileşimin kesin çalışması için
      AFRAME.registerComponent('hologram-link', {
        schema: { url: { type: 'string' } },
        init: function () {
          this.el.addEventListener('click', () => {
            window.location.href = this.data.url;
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true;" 
             color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false">
        <a-entity cursor="rayOrigin: mouse;" raycaster="objects: .clickable"></a-entity>
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-entity position="0 0 0.1">
          <a-cone geometry="radiusBottom: 0.5; radiusTop: 0.1; height: 1.2" 
                  material="color: #00f3ff; opacity: 0.15; transparent: true; side: double; blending: additive"
                  position="0 -0.5 0" rotation="0 0 0"
                  animation="property: material.opacity; from: 0.1; to: 0.3; dir: alternate; dur: 1000; loop: true">
          </a-cone>

          <a-circle src="qrkartvizit.jpg" radius="0.35" 
                    material="opacity: 0.9; transparent: true; blending: additive; side: double"
                    animation="property: position; to: 0 0.05 0.1; dir: alternate; dur: 2000; loop: true">
            <a-plane width="0.7" height="0.01" color="#00f3ff" position="0 0 0.01"
                     animation="property: position; from: 0 0.35 0.01; to: 0 -0.35 0.01; dur: 2500; loop: true; easing: linear"></a-plane>
          </a-circle>

          <a-ring radius-inner="0.38" radius-outer="0.4" color="#00f3ff" rotation="90 0 0"
                  animation="property: rotation; to: 90 360 0; loop: true; dur: 4000; easing: linear"></a-ring>
          <a-ring radius-inner="0.42" radius-outer="0.43" color="#ff3300" rotation="90 0 0" opacity="0.6"
                  animation="property: rotation; to: 90 -360 0; loop: true; dur: 7000; easing: linear"></a-ring>
        </a-entity>

        <a-entity position="0 0.8 0.1">
            <a-text value="ARTIRILMIS GERCEKLIK CV" align="center" width="3" color="#ffffff" font="exo2bold"></a-text>
            <a-plane width="1.2" height="0.02" color="#ff3300" position="0 -0.1 0"></a-plane>
        </a-entity>

        <a-entity position="-1 0.4 0.2" rotation="0 20 0" scale="0.45 0.45 0.45">
          <a-plane width="2.2" height="0.8" color="#001a33" opacity="0.8" material="transparent: true"></a-plane>
          <a-plane width="2.2" height="0.8" material="wireframe: true; color: #00f3ff; opacity: 0.3"></a-plane>
          <a-text value="EGITIM & ARASTIRMA" position="-1 0.3 0.02" width="2.5" color="#00f3ff" font="exo2bold"></a-text>
          
          <a-entity class="clickable" position="0 0.05 0.03" hologram-link="url: https://tez.yok.gov.tr/UlusalTezMerkezi/tezSorguSonucYeni.jsp">
            <a-text value="Yuksek Lisans Tezi:\nUnity ve Vuforia kullanarak bir\nartirilmis gerceklik uygulamasi" position="-1 0 0" width="2"></a-text>
          </a-entity>
          
          <a-entity class="clickable" position="0 -0.25 0.03" hologram-link="url: https://agbiol.congress.gen.tr/files/site/16/files/AGBIOL%202022%20FULL%20PROCEEDINGS%20BOOK.pdf#page1029">
            <a-text value="Uluslararasi Hakemli Bildiri:\nCOMPARISON OF TWO APPS BUILT\nWITH UNITY AND VUFORIA" position="-1 0 0" width="2"></a-text>
          </a-entity>
        </a-entity>

        <a-entity position="1 0.4 0.2" rotation="0 -20 0" scale="0.45 0.45 0.45">
          <a-plane width="2.2" height="0.8" color="#001a33" opacity="0.8"></a-plane>
          <a-plane width="2.2" height="0.8" material="wireframe: true; color: #ff3300; opacity: 0.3"></a-plane>
          <a-text value="DENEYIM" position="-1 0.3 0.02" width="2.5" color="#ff3300" font="exo2bold"></a-text>
          
          <a-plane width="0.01" height="0.4" color="#ff3300" position="-0.9 -0.1 0.01"></a-plane>
          <a-sphere radius="0.03" color="#ff3300" position="-0.9 0.1 0.02"></a-sphere>
          <a-sphere radius="0.03" color="#ff3300" position="-0.9 -0.1 0.02"></a-sphere>
          <a-sphere radius="0.03" color="#ff3300" position="-0.9 -0.3 0.02"></a-sphere>
          
          <a-text value="2024: Ministry of Industry and Tech.\n2023: Cerkezkoy OIZ Directorate\n2022: Turuncu Mavi Web Agency" position="-0.8 -0.1 0.02" width="2" line-height="55"></a-text>
        </a-entity>

        <a-entity position="-1 -0.4 0.2" rotation="0 20 0" scale="0.45 0.45 0.45">
          <a-plane width="2.2" height="0.7" color="#001a33" opacity="0.8"></a-plane>
          <a-text value="TEKNOLOJI YIGINI" position="-1 0.25 0.02" width="2.5" color="#00f3ff"></a-text>
          <a-text value="Unity | Vuforia | WebAR\nHolographic UI | C# .NET" position="-1 -0.1 0.02" width="2.2" color="#ffffff" line-height="50"></a-text>
        </a-entity>

        <a-entity position="1 -0.4 0.2" rotation="0 -20 0" scale="0.45 0.45 0.45">
          <a-plane width="2.2" height="0.7" color="#001a33" opacity="0.8"></a-plane>
          <a-text value="SOSYAL MEDYA & ILETISIM" position="-1 0.25 0.02" width="2.5" color="#00f3ff"></a-text>
          
          <a-entity class="clickable" position="0 -0.05 0.03" hologram-link="url: https://www.instagram.com/sametulusoy59">
            <a-text value="instagram/sametulusoy59" position="-1 0 0" width="2.2" color="#E1306C"></a-text>
          </a-entity>
          <a-entity class="clickable" position="0 -0.2 0.03" hologram-link="url: https://tr.linkedin.com/in/csametulusoy">
            <a-text value="linkedin/in/csametulusoy" position="-1 0 0" width="2.2" color="#0077b5"></a-text>
          </a-entity>
        </a-entity>

        <a-entity position="0 0 0">
            <a-plane width="0.05" height="0.05" color="#00f3ff" position="-0.5 0.5 0.3" opacity="0.4" animation="property: rotation; to: 360 360 0; loop: true; dur: 5000"></a-plane>
            <a-plane width="0.03" height="0.03" color="#ff3300" position="0.6 -0.6 0.3" opacity="0.4" animation="property: position; to: 0.6 -0.55 0.3; dir: alternate; loop: true; dur: 3000"></a-plane>
            <a-plane width="0.04" height="0.04" color="#00f3ff" position="0.8 0.1 0.4" opacity="0.3"></a-plane>
            <a-plane width="0.02" height="0.02" color="#ffffff" position="-0.7 -0.1 0.4" opacity="0.5"></a-plane>
            <a-plane width="0.05" height="0.01" color="#00f3ff" position="0.2 0.7 0.2" opacity="0.6"></a-plane>
        </a-entity>

      </a-entity>
    </a-scene>
  </body>
</html>
