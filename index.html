<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>AR Holografik CV - Çağrı Samet ULUSOY</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <script>
      AFRAME.registerComponent('open-link', {
        schema: { url: { type: 'string' } },
        init: function () {
          this.el.addEventListener('click', () => {
            window.open(this.data.url, '_blank');
          });
        }
      });
    </script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false">
        <a-cursor color="#00f3ff" scale="0.5 0.5 0.5" raycaster="objects: .clickable"></a-cursor>
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-plane position="0 0 0" scale="1.2 1.5 1" color="#001a33" opacity="0.8" material="transparent: true"></a-plane>

        <a-text value="Cagri Samet ULUSOY\nBilgisayar Yuksek Muhendisi" position="-0.5 0.6 0.05" scale="0.4 0.4 0.4" color="#00f3ff" font="exo2bold" align="left"></a-text>

        <a-plane position="0 0.3 0.02" scale="1.1 0.4 1" color="#004080" opacity="0.6"></a-plane>
        <a-text value="EGITIM & YAYINLAR (Tikla)" position="-0.5 0.43 0.05" scale="0.3 0.3 0.3" color="#ffffff" font="exo2bold"></a-text>
        
        <a-plane class="clickable" position="0 0.25 0.05" scale="1.0 0.1 1" color="#002244" open-link="url: https://tez.yok.gov.tr/UlusalTezMerkezi/tezSorguSonucYeni.jsp">
          <a-text value="> YL Tezi: Unity ve Vuforia Kullanarak AR" position="-0.48 0 0.02" scale="0.25 0.25 0.25" color="#00f3ff"></a-text>
        </a-plane>

        <a-plane class="clickable" position="0 0.12 0.05" scale="1.0 0.1 1" color="#002244" open-link="url: https://agbiol.congress.gen.tr/files/site/16/files/AGBIOL%202022%20FULL%20PROCEEDINGS%20BOOK.pdf#page1029">
          <a-text value="> Bildiri: COMPARISON OF TWO APPS..." position="-0.48 0 0.02" scale="0.25 0.25 0.25" color="#00f3ff"></a-text>
        </a-plane>

        <a-plane position="0 -0.2 0.02" scale="1.1 0.4 1" color="#004080" opacity="0.6"></a-plane>
        <a-text value="CALISMA DENEYIMI" position="-0.5 -0.05 0.05" scale="0.3 0.3 0.3" color="#ffffff" font="exo2bold"></a-text>
        
        <a-text value="- Ministry of Industry and Technology (2024-Halen)\n- Cerkezkoy OSB Mudurlugu (Stajyer)\n- Turuncu Mavi Web Tasarim Ajansi (Stajyer)" position="-0.5 -0.2 0.05" scale="0.25 0.25 0.25" color="#a0f0ff" line-height="60"></a-text>

        <a-plane position="0 -0.6 0.02" scale="1.1 0.3 1" color="#004080" opacity="0.6"></a-plane>
        
        <a-plane class="clickable" position="-0.25 -0.6 0.05" scale="0.4 0.15 1" color="#cc0052" open-link="url: https://www.instagram.com/sametulusoy59">
          <a-text value="INSTAGRAM" position="0 0 0.02" scale="0.3 0.3 0.3" align="center" color="#ffffff"></a-text>
        </a-plane>

        <a-plane class="clickable" position="0.25 -0.6 0.05" scale="0.4 0.15 1" color="#0077b5" open-link="url: https://tr.linkedin.com/in/csametulusoy">
          <a-text value="LINKEDIN" position="0 0 0.02" scale="0.3 0.3 0.3" align="center" color="#ffffff"></a-text>
        </a-plane>

      </a-entity>
    </a-scene>
  </body>
</html>
